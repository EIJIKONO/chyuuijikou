<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>注意事項アプリ</title>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --border: #d9dde3;
    --text: #222;
    --muted: #6b7280;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --danger: #dc2626;
    --tag-bg: #e5edff;
    --tag-text: #1e40af;
    --tag-active: #2563eb;
    --tag-active-text: #fff;
    --hit: #fff7d6;
    --done: #94a3b8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", "Meiryo", sans-serif;
    font-size: 14px;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    font-size: 18px; margin: 0; flex: 0 0 auto;
  }
  header .spacer { flex: 1; }
  button {
    font-family: inherit; font-size: 13px;
    padding: 6px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: #fff; color: var(--text);
    cursor: pointer;
  }
  button:hover { background: #f0f3f7; }
  button.primary {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  button.primary:hover { background: var(--primary-dark); }
  button.danger {
    background: #fff; color: var(--danger); border-color: var(--danger);
  }
  button.danger:hover { background: #fef2f2; }

  .toolbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .search-row { display: flex; gap: 8px; align-items: center; }
  .search-row input[type="text"] {
    flex: 1;
    font-family: inherit; font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: #fff;
  }
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag-row .label { color: var(--muted); font-size: 12px; margin-right: 4px; }
  .chip {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    background: var(--tag-bg); color: var(--tag-text);
    cursor: pointer;
    border: 1px solid transparent;
    user-select: none;
  }
  .chip.active {
    background: var(--tag-active); color: var(--tag-active-text);
  }
  .chip.readonly { cursor: default; }

  main {
    display: flex;
    height: calc(100vh - 130px);
    min-height: 400px;
  }
  .pane-list {
    flex: 0 0 280px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    transition: flex-basis 0.2s ease;
  }
  body.list-hidden .pane-list {
    display: none;
  }
  .pane-detail {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    background: var(--bg);
  }
  .btn-toggle-list {
    padding: 6px 10px;
    font-size: 18px;
    line-height: 1;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-toggle-list:hover { background: #f0f3f7; }

  /* モバイル対応 */
  @media (max-width: 640px) {
    header { padding: 8px 12px; gap: 8px; flex-wrap: wrap; }
    header h1 { font-size: 16px; }
    .toolbar { padding: 8px 12px; }
    .pane-detail { padding: 12px 14px; }
    .detail-card { padding: 14px 14px; }
    .detail-card h2 { font-size: 18px; }
    /* モバイルでは左ペインを絶対配置のドロワーに */
    main { position: relative; }
    .pane-list {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 85%;
      max-width: 320px;
      z-index: 5;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
    }
  }
  .entry-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .entry-item:hover { background: #f0f3f7; }
  .entry-item.selected { background: var(--hit); }
  .entry-item .title { font-weight: 600; margin-bottom: 4px; }
  .entry-item .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .entry-item .tags .chip { font-size: 10px; padding: 1px 6px; }
  .empty {
    padding: 30px; text-align: center; color: var(--muted);
  }
  .detail-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
  }
  .detail-card h2 {
    margin: 0 0 8px; font-size: 22px;
  }
  .detail-card .detail-tags {
    display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px;
  }
  .detail-card section {
    margin-top: 20px;
  }
  .detail-card section h3 {
    font-size: 14px; color: var(--primary-dark);
    margin: 0 0 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--primary);
    display: flex; align-items: center; justify-content: space-between;
  }
  .detail-card .body-text {
    white-space: pre-wrap;
    background: #fafbfc;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    line-height: 1.7;
  }
  .checklist {
    list-style: none; margin: 0; padding: 0;
  }
  .checklist li {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 8px;
    border-radius: 4px;
  }
  .checklist li:hover { background: #f0f3f7; }
  .checklist li input[type="checkbox"] {
    margin-top: 3px; width: 16px; height: 16px;
    cursor: pointer;
  }
  .checklist li label {
    flex: 1; cursor: pointer; line-height: 1.6;
  }
  .checklist li.done label {
    text-decoration: line-through; color: var(--done);
  }

  /* グループ化されたチェックリスト */
  .checklist-overall {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
    padding: 8px 10px;
    background: #fafbfc;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .checklist-overall-text {
    font-size: 13px; color: var(--muted);
    flex: 0 0 auto;
    min-width: 140px;
  }
  .checklist-overall-text strong {
    color: var(--text);
    font-size: 14px;
    margin-right: 4px;
  }
  .checklist-overall-bar {
    flex: 1;
    height: 8px;
    background: #e5e7eb;
    border-radius: 999px;
    overflow: hidden;
  }
  .checklist-overall-fill {
    height: 100%;
    background: linear-gradient(90deg, #60a5fa, #2563eb);
    transition: width 0.3s ease;
  }
  .checklist-overall-fill.complete {
    background: linear-gradient(90deg, #4ade80, #16a34a);
  }
  .checklist-global-actions {
    display: flex; gap: 6px; margin-bottom: 10px;
  }
  .checklist-global-actions button {
    font-size: 12px; padding: 3px 10px;
  }
  .checklist-group {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .checklist-group.complete {
    background: #f0fdf4;
    border-color: #86efac;
  }
  .checklist-group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
    background: #f9fafb;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
  }
  .checklist-group-header:hover { background: #f0f3f7; }
  .checklist-group.complete .checklist-group-header {
    background: #dcfce7;
  }
  .checklist-group.collapsed .checklist-group-header {
    border-bottom: none;
  }
  .checklist-group-toggle {
    color: var(--muted);
    font-size: 11px;
    width: 12px;
    flex: 0 0 12px;
  }
  .checklist-group-title {
    flex: 1;
    color: var(--primary-dark);
  }
  .checklist-group.complete .checklist-group-title {
    color: #15803d;
  }
  .checklist-group-badge {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    padding: 2px 10px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .checklist-group.complete .checklist-group-badge {
    background: #16a34a;
    color: #fff;
    border-color: #16a34a;
  }
  .checklist-group-items {
    list-style: none; margin: 0; padding: 6px 8px;
  }
  .checklist-group-items li {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 10px;
    border-radius: 4px;
  }
  .checklist-group-items li:hover { background: #f0f3f7; }
  .checklist-group-items li input[type="checkbox"] {
    margin-top: 3px; width: 18px; height: 18px;
    cursor: pointer;
    flex: 0 0 18px;
  }
  .checklist-group-items li label {
    flex: 1; cursor: pointer; line-height: 1.6;
  }
  .checklist-group-items li.done label {
    text-decoration: line-through; color: var(--done);
  }

  /* Markdown本文 */
  .md-body {
    background: #fafbfc;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    line-height: 1.75;
  }
  .md-body > *:first-child { margin-top: 0; }
  .md-body > *:last-child { margin-bottom: 0; }
  .md-body p { margin: 6px 0; }
  .md-body ul, .md-body ol { margin: 6px 0; padding-left: 22px; }
  .md-body li { margin: 2px 0; }
  .md-body blockquote {
    margin: 8px 0;
    padding: 6px 12px;
    border-left: 3px solid var(--primary);
    background: #eff6ff;
    color: var(--text);
    border-radius: 3px;
  }
  .md-body h4, .md-body h5, .md-body h6 {
    margin: 12px 0 4px; color: var(--primary-dark);
  }
  .md-body h4 { font-size: 15px; }
  .md-body h5 { font-size: 14px; }
  .md-body code {
    background: #e5e7eb; padding: 1px 5px;
    border-radius: 3px; font-size: 0.92em;
  }
  .md-body hr {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 12px 0;
  }

  /* 注意事項: 見出しセクション */
  .notes-group {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .notes-group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
    background: #f9fafb;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
  }
  .notes-group-header:hover { background: #f0f3f7; }
  .notes-group.collapsed .notes-group-header { border-bottom: none; }
  .notes-group-title { flex: 1; color: var(--primary-dark); }
  .notes-group.notes-level-1 .notes-group-title { font-size: 16px; }
  .notes-group.notes-level-3 .notes-group-header {
    background: #fdfdfd;
    font-size: 13px;
    padding: 8px 12px;
  }
  .notes-group.notes-level-3 .notes-group-title {
    color: #475569;
  }
  .notes-group-body {
    padding: 10px 14px;
    border: none;
    background: #fff;
    border-radius: 0;
  }
  .actions-row {
    display: flex; gap: 8px;
    margin-top: 24px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* 競馬場タブ */
  .course-tabs {
    display: flex; gap: 4px;
    overflow-x: auto;
    padding: 4px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .course-tab {
    flex: 0 0 auto;
    padding: 6px 12px;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .course-tab:hover { background: #f0f3f7; color: var(--text); }
  .course-tab.active {
    background: var(--primary-dark, #2563eb);
    border-color: var(--primary-dark, #2563eb);
    color: #fff;
    font-weight: 600;
  }
  .course-tab-add {
    flex: 0 0 auto;
    padding: 6px 10px;
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: 999px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
  }
  .course-tab-add:hover { background: #f0f3f7; color: var(--text); }
  .course-progress {
    font-size: 12px; color: var(--muted);
    margin-bottom: 8px;
  }
  .course-empty {
    padding: 14px;
    color: var(--muted); font-size: 13px;
    background: #fafbfc;
    border: 1px dashed var(--border);
    border-radius: 6px;
    text-align: center;
  }
  /* 距離・コース ジャンプチップ */
  .course-jump-bar {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin: 4px 0 12px;
    padding: 8px 10px;
    background: #fafbfc;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .course-jump-bar .label {
    font-size: 11px; color: var(--muted);
    align-self: center; margin-right: 2px;
  }
  .course-jump-chip {
    flex: 0 0 auto;
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }
  .course-jump-chip:hover {
    background: var(--tag-bg);
    border-color: var(--primary);
    color: var(--primary-dark);
  }
  .course-jump-chip.complete {
    background: #f0fdf4; color: #166534; border-color: #86efac;
  }
  .checklist-group.jump-target-hit {
    animation: groupPulse 1.2s ease;
  }
  @keyframes groupPulse {
    0%, 55% { box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.35); }
    100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
  }

  /* 競馬場タブの関連リソース */
  .course-resources {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 10px;
  }
  .course-resource-block {
    flex: 1 1 260px;
    background: #fafbfc;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .course-resource-block > .title {
    font-size: 11px; color: var(--muted);
    margin-bottom: 6px;
  }
  .course-link-list {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .course-link-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid var(--primary);
    border-radius: 999px;
    background: #eff6ff;
    color: var(--primary-dark);
    text-decoration: none;
    white-space: nowrap;
    max-width: 100%;
  }
  .course-link-chip:hover { background: var(--primary); color: #fff; }
  .course-link-chip .label {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 240px;
  }
  .course-image-list {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .course-image-thumb-wrap {
    display: flex; flex-direction: column; gap: 2px;
    align-items: center; max-width: 120px;
  }
  .course-image-thumb {
    width: 120px; height: 90px;
    object-fit: cover;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: zoom-in;
    background: #fff;
    display: block;
  }
  .course-image-thumb:hover { border-color: var(--primary); }
  .course-image-thumb-wrap .caption {
    font-size: 11px; color: var(--muted);
    text-align: center;
    max-width: 120px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* 編集モード: リンク・画像 */
  .resource-edit-section {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    background: #fafbfc;
    margin-bottom: 10px;
  }
  .resource-edit-section > .title {
    font-size: 12px; color: var(--muted);
    margin-bottom: 6px; font-weight: 600;
  }
  .link-edit-row {
    display: flex; gap: 6px; align-items: center; margin-bottom: 4px;
  }
  .link-edit-row input[type="text"] {
    font-family: inherit; font-size: 13px;
    padding: 5px 8px;
    border: 1px solid var(--border); border-radius: 4px;
    background: #fff; min-width: 0;
  }
  .link-edit-row .lbl { flex: 0 0 40%; }
  .link-edit-row .url { flex: 1 1 auto; }
  .link-edit-row button {
    padding: 4px 8px; color: var(--danger); border-color: var(--border);
  }
  .image-edit-row {
    display: flex; gap: 8px; align-items: center;
    padding: 6px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 4px;
  }
  .image-edit-row img {
    width: 70px; height: 54px; object-fit: cover;
    border-radius: 3px;
    background: #f0f3f7;
    cursor: zoom-in;
    flex: 0 0 70px;
  }
  .image-edit-row input[type="text"] {
    flex: 1; font-family: inherit; font-size: 13px;
    padding: 5px 8px;
    border: 1px solid var(--border); border-radius: 4px;
    background: #fff; min-width: 0;
  }
  .image-edit-row button {
    padding: 4px 8px; color: var(--danger); border-color: var(--border);
  }
  .resource-edit-section .row-actions {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px;
  }

  /* 画像ビューア */
  .image-viewer {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
    padding: 30px;
  }
  .image-viewer.show { display: flex; }
  .image-viewer img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .image-viewer .iv-close {
    position: absolute; top: 14px; right: 14px;
    color: #fff; font-size: 22px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    line-height: 1;
  }
  .image-viewer .iv-close:hover { background: rgba(0,0,0,0.75); }

  /* インライン編集 */
  .title-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .title-row h2 { margin: 0; flex: 1; }
  .icon-btn {
    font-size: 12px; padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: #fff; color: var(--muted);
    cursor: pointer;
  }
  .icon-btn:hover { background: #f0f3f7; color: var(--text); }
  .section-actions { display: flex; gap: 6px; }
  .section-edit-area {
    background: #fafbfc;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }
  .section-edit-area input[type="text"],
  .section-edit-area textarea {
    width: 100%;
    font-family: inherit; font-size: 14px;
    padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    background: #fff;
    resize: vertical;
  }
  .section-edit-area textarea { line-height: 1.7; }
  .section-edit-actions {
    display: flex; gap: 6px; justify-content: flex-end;
    margin-top: 10px;
  }
  .edit-hint {
    font-size: 11px; color: var(--muted); margin-top: 4px;
  }
  .tags-row-view {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--panel);
    border-radius: 8px;
    width: 90%; max-width: 720px;
    max-height: 90vh; overflow-y: auto;
    padding: 20px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h2 { margin: 0 0 16px; font-size: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 12px; color: var(--muted);
    margin-bottom: 4px; font-weight: 600;
  }
  .form-group input[type="text"],
  .form-group textarea {
    width: 100%;
    font-family: inherit; font-size: 14px;
    padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    background: #fff;
    resize: vertical;
  }
  .form-group .hint {
    font-size: 11px; color: var(--muted); margin-top: 3px;
  }
  .checklist-edit-list { list-style: none; padding: 0; margin: 0; }
  .checklist-edit-list li {
    display: flex; gap: 6px; margin-bottom: 6px;
  }
  .checklist-edit-list li input[type="text"] { flex: 1; }

<script>
'use strict';

// ===== データレイヤー =====
const STORAGE_KEY = 'noticeAppData';
const DATA_VERSION = 2;

const JRA_COURSES = ['札幌', '函館', '福島', '新潟', '東京', '中山', '中京', '京都', '阪神', '小倉'];
function defaultCourses() {
  return JRA_COURSES.map(name => ({ name, checklist: [] }));
}
function ensureCourses(entry) {
  if (!Array.isArray(entry.courses)) entry.courses = defaultCourses();
  entry.courses = entry.courses.map(c => ({
    name: (c && c.name) ? String(c.name) : '(無題)',
    checklist: Array.isArray(c && c.checklist)
      ? c.checklist.map(x => ({ text: String(x.text || ''), done: !!x.done }))
      : [],
    links: Array.isArray(c && c.links)
      ? c.links.map(l => ({
          label: String((l && l.label) || ''),
          url: String((l && l.url) || '')
        })).filter(l => l.url)
      : [],
    images: Array.isArray(c && c.images)
      ? c.images.map(im => ({
          src: String((im && im.src) || ''),
          caption: String((im && im.caption) || '')
        })).filter(im => im.src)
      : []
  }));
  return entry;
}

const SAMPLE_DATA = {
  version: DATA_VERSION,
  entries: [
    {
      id: crypto.randomUUID(),
      title: '競馬予想',
      keywords: ['競馬', '予想', '馬券', 'レース', '重賞', 'JRA'],
      tags: ['趣味', '競馬', '予想'],
      flow: '1. レース前日：出馬表・枠順を確認\n2. 各馬の前走3戦の内容（タイム・上がり3F・着差）を確認\n3. 調教タイムと馬体重推移をチェック\n4. コース適性（芝/ダート・距離・右回り/左回り）を評価\n5. 騎手×調教師×厩舎の組み合わせを確認\n6. 当日朝：馬場状態・天気・風向きを最終確認\n7. パドック・返し馬で気配チェック\n8. オッズ動向と人気のズレを確認\n9. 軸馬・相手・押さえを決定し買い目を組む\n10. 予算配分を決めて投票',
      checklist: [
        { text: '予算の上限を決めた', done: false },
        { text: '出馬表・枠順を確認した', done: false },
        { text: '前走3戦の内容を確認した', done: false },
        { text: '調教タイムをチェックした', done: false },
        { text: '馬体重の増減を確認した', done: false },
        { text: '馬場状態（良/稍/重/不良）を確認した', done: false },
        { text: '天気・風の影響を考慮した', done: false },
        { text: 'パドック・返し馬を見た', done: false },
        { text: 'オッズ動向を最終確認した', done: false },
        { text: '買い目と配分を紙に書き出した', done: false },
        { text: '締切時刻に余裕を持って投票した', done: false }
      ],
      notes: '・予算は厳守。負けが込んでも追加入金しない\n・1日の上限を決めて、超えたら即撤退\n・1レース全張り禁止、複数レースに分散\n・「絶対」は競馬にない。常に外れる前提で配分\n・直前で気配が悪いと感じたら見送る勇気\n・体調不良・飲酒時・感情が乱れている時は予想しない\n・当たり分の70%は引き出して再投資に回さない\n・人気馬を切る判断は明確な根拠があるときだけ\n・血統・ローテはあくまで補助情報、現状の状態優先',
      courses: defaultCourses(),
      updatedAt: new Date().toISOString()
    }
  ]
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      saveData(SAMPLE_DATA);
      return SAMPLE_DATA;
    }
    const parsed = JSON.parse(raw);
    if (!parsed.entries) throw new Error('invalid');
    // DATA_VERSION が上がったら初期サンプルで上書き
    if ((parsed.version || 0) < DATA_VERSION) {
      saveData(SAMPLE_DATA);
      return SAMPLE_DATA;
    }
    // 競馬場タブの構造補完（旧データ互換）
    let migrated = false;
    parsed.entries.forEach(e => {
      if (!Array.isArray(e.courses)) migrated = true;
      ensureCourses(e);
    });
    if (migrated) saveData(parsed);
    return parsed;
  } catch {
    saveData(SAMPLE_DATA);
    return SAMPLE_DATA;
  }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ===== 状態 =====
let state = {
  data: loadData(),
  searchTerm: '',
  activeTags: new Set(),
  selectedId: null,
  editingId: null,       // モーダル: null = 新規, それ以外 = 編集対象ID
  editingSection: null,  // インライン編集: { entryId, section: 'title'|'tags'|'flow'|'checklist'|'notes'|`course:${i}` } | null
  collapsedSections: new Set(), // セッション単位: `${entryId}::${kind}::${name}`
  selectedCourseIndexByEntry: {} // { entryId: number } - タブ選択状態
};

function getCourseIndex(entry) {
  ensureCourses(entry);
  if (entry.courses.length === 0) return -1;
  const stored = state.selectedCourseIndexByEntry[entry.id];
  if (typeof stored === 'number' && stored >= 0 && stored < entry.courses.length) return stored;
  return 0;
}
function setCourseIndex(entry, idx) {
  state.selectedCourseIndexByEntry[entry.id] = idx;
}

function isEditingSection(entryId, section) {
  return state.editingSection
      && state.editingSection.entryId === entryId
      && state.editingSection.section === section;
}

function startSectionEdit(entryId, section) {
  state.editingSection = { entryId, section };
  render();
}

function cancelSectionEdit() {
  state.editingSection = null;
  render();
}

// ===== ユーティリティ =====
function normalize(s) {
  return (s || '').normalize('NFKC').toLowerCase();
}

function splitCsv(s) {
  return (s || '').split(/[,、]/).map(t => t.trim()).filter(Boolean);
}

// Markdownチェックリストの解析
function cleanHeading(raw) {
  let s = raw.replace(/^#+\s*/, '').trim();
  s = s.replace(/^[■▪●◆◇○□△▲▼※＊*]+\s*/, '');
  s = s.replace(/（[^（）]*）\s*$/, '').trim();
  s = s.replace(/\([^()]*\)\s*$/, '').trim();
  return s;
}

// チェックリストを [プレフィックス] で自動グループ化
function groupChecklistItems(checklist) {
  const groups = []; // [{name, items:[{text,done,index}]}]
  const byName = new Map();
  const NOSEC = '（全般）';
  (checklist || []).forEach((c, idx) => {
    const text = c && typeof c.text === 'string' ? c.text : '';
    const m = text.match(/^\s*\[([^\]]+)\]\s*(.*)$/);
    const name = m ? m[1].trim() : NOSEC;
    const itemText = m ? m[2].trim() : text;
    let g = byName.get(name);
    if (!g) {
      g = { name, items: [] };
      byName.set(name, g);
      groups.push(g);
    }
    g.items.push({ text: itemText, done: !!c.done, index: idx });
  });
  return groups;
}

// ごく簡易のMarkdownインライン装飾（XSSに配慮しエスケープしてから適用）
function mdEscape(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function mdInline(s) {
  let out = mdEscape(s);
  out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/`([^`]+?)`/g, '<code>$1</code>');
  return out;
}

// ブロックレベルのMarkdown簡易レンダラ
function renderMarkdownBody(text) {
  const frag = document.createDocumentFragment();
  const lines = (text || '').split(/\r?\n/);
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^\s*---+\s*$/.test(line)) {
      frag.appendChild(document.createElement('hr'));
      i++; continue;
    }
    if (/^>\s?/.test(line)) {
      const bq = document.createElement('blockquote');
      const parts = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        parts.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      bq.innerHTML = mdInline(parts.join('\n')).replace(/\n/g, '<br>');
      frag.appendChild(bq);
      continue;
    }
    const hMatch = line.match(/^(#{4,6})\s+(.+)$/);
    if (hMatch) {
      const h = document.createElement('h' + hMatch[1].length);
      h.innerHTML = mdInline(hMatch[2]);
      frag.appendChild(h);
      i++; continue;
    }
    if (/^\s*[-*]\s+/.test(line)) {
      const ul = document.createElement('ul');
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
        const li = document.createElement('li');
        li.innerHTML = mdInline(lines[i].replace(/^\s*[-*]\s+/, ''));
        ul.appendChild(li);
        i++;
      }
      frag.appendChild(ul);
      continue;
    }
    if (/^\s*\d+\.\s+/.test(line)) {
      const ol = document.createElement('ol');
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        const li = document.createElement('li');
        li.innerHTML = mdInline(lines[i].replace(/^\s*\d+\.\s+/, ''));
        ol.appendChild(li);
        i++;
      }
      frag.appendChild(ol);
      continue;
    }
    if (line.trim() === '') { i++; continue; }
    const para = [];
    while (i < lines.length && lines[i].trim() !== ''
        && !/^(\s*---+\s*$|>\s?|\s*[-*]\s+|\s*\d+\.\s+|#{1,6}\s)/.test(lines[i])) {
      para.push(lines[i]); i++;
    }
    if (para.length) {
      const p = document.createElement('p');
      p.innerHTML = mdInline(para.join('\n')).replace(/\n/g, '<br>');
      frag.appendChild(p);
    }
  }
  return frag;
}

// 注意事項を ## / ### の見出しで折り畳みセクション化して描画
function renderNotesContent(container, text, entryId) {
  if (!text || !text.trim()) {
    const empty = document.createElement('div');
    empty.style.color = 'var(--muted)';
    empty.style.fontSize = '13px';
    empty.textContent = '（未入力）';
    container.appendChild(empty);
    return;
  }
  const lines = text.split(/\r?\n/);
  const hasHeadings = lines.some(l => /^#{1,3}\s/.test(l));
  if (!hasHeadings) {
    const div = document.createElement('div');
    div.className = 'md-body';
    div.appendChild(renderMarkdownBody(text));
    container.appendChild(div);
    return;
  }
  // 先頭 preamble + 各セクション
  let preamble = [];
  const sections = [];
  let current = null;
  for (const line of lines) {
    const m = line.match(/^(#{1,3})\s+(.+)$/);
    if (m) {
      if (current) sections.push(current);
      current = { level: m[1].length, heading: m[2].trim(), body: [] };
    } else if (current) {
      current.body.push(line);
    } else {
      preamble.push(line);
    }
  }
  if (current) sections.push(current);
  if (preamble.join('').trim()) {
    const pre = document.createElement('div');
    pre.className = 'md-body';
    pre.appendChild(renderMarkdownBody(preamble.join('\n')));
    container.appendChild(pre);
  }
  sections.forEach(sec => {
    const cleaned = sec.heading
      .replace(/^[■▪●◆◇○□△▲▼※＊*]+\s*/, '')
      .trim();
    const key = `${entryId}::notes::${sec.level}::${cleaned}`;
    const collapsed = state.collapsedSections.has(key);
    const groupDiv = document.createElement('div');
    groupDiv.className = 'notes-group notes-level-' + sec.level + (collapsed ? ' collapsed' : '');

    const header = document.createElement('div');
    header.className = 'notes-group-header';
    const toggle = document.createElement('span');
    toggle.className = 'checklist-group-toggle';
    toggle.textContent = collapsed ? '▶' : '▼';
    const title = document.createElement('span');
    title.className = 'notes-group-title';
    title.textContent = cleaned;
    header.appendChild(toggle);
    header.appendChild(title);
    header.onclick = () => {
      if (state.collapsedSections.has(key)) state.collapsedSections.delete(key);
      else state.collapsedSections.add(key);
      render();
    };
    groupDiv.appendChild(header);

    if (!collapsed) {
      const body = document.createElement('div');
      body.className = 'md-body notes-group-body';
      body.appendChild(renderMarkdownBody(sec.body.join('\n')));
      groupDiv.appendChild(body);
    }
    container.appendChild(groupDiv);
  });
}

function parseMarkdownChecklist(md, opts) {
  const withSection = opts && opts.withSection !== false;
  const lines = (md || '').split(/\r?\n/);
  const items = [];
  let h2 = null, h3 = null;
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, '');
    if (/^###\s/.test(line)) {
      h3 = cleanHeading(line);
      continue;
    }
    if (/^##\s/.test(line)) {
      h2 = cleanHeading(line);
      h3 = null;
      continue;
    }
    if (/^#\s/.test(line)) {
      h2 = cleanHeading(line);
      h3 = null;
      continue;
    }
    const m = line.match(/^\s*[-*]\s*\[([ xX])\]\s*(.+)$/);
    if (m) {
      const done = /[xX]/.test(m[1]);
      let text = m[2].trim();
      if (withSection) {
        const section = h3 ? (h2 ? `${h2} / ${h3}` : h3) : h2;
        if (section) text = `[${section}] ${text}`;
      }
      items.push({ text, done });
    }
  }
  return items;
}

function allTags() {
  const set = new Set();
  state.data.entries.forEach(e => (e.tags || []).forEach(t => set.add(t)));
  const order = Array.isArray(state.data.tagOrder) ? state.data.tagOrder : [];
  const ordered = order.filter(t => set.has(t));
  const remaining = Array.from(set).filter(t => !order.includes(t)).sort();
  return [...ordered, ...remaining];
}

function filterEntries() {
  const q = normalize(state.searchTerm);
  return state.data.entries.filter(e => {
    // タグAND絞り込み
    for (const t of state.activeTags) {
      if (!(e.tags || []).includes(t)) return false;
    }
    if (!q) return true;
    // 検索文字列：title / keywords / tags / flow / notes / checklist text を対象に部分一致
    const haystacks = [
      e.title,
      (e.keywords || []).join(' '),
      (e.tags || []).join(' '),
      e.flow,
      e.notes,
      (e.checklist || []).map(c => c.text).join(' ')
    ].map(normalize).join(' ');
    return haystacks.includes(q);
  });
}

// ===== レンダリング =====
function render() {
  renderTags();
  renderList();
  renderDetail();
}

function renderTags() {
  const container = document.getElementById('tag-row');
  container.innerHTML = '<span class="label">タグ:</span>';
  const tags = allTags();
  if (tags.length === 0) {
    const span = document.createElement('span');
    span.className = 'label';
    span.textContent = '（タグ未登録）';
    container.appendChild(span);
  } else {
    tags.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'chip' + (state.activeTags.has(t) ? ' active' : '');
      chip.textContent = t;
      chip.onclick = () => {
        // 単一選択: 同じタグ再タップで解除、別のタグなら置換
        if (state.activeTags.has(t)) {
          state.activeTags.clear();
        } else {
          state.activeTags.clear();
          state.activeTags.add(t);
        }
        render();
      };
      container.appendChild(chip);
    });
  }
  const manageBtn = document.createElement('button');
  manageBtn.className = 'icon-btn';
  manageBtn.style.marginLeft = 'auto';
  manageBtn.textContent = '⚙ タグ管理';
  manageBtn.onclick = openTagManageModal;
  container.appendChild(manageBtn);
}

function renderList() {
  const container = document.getElementById('pane-list');
  container.innerHTML = '';
  const list = filterEntries();
  if (list.length === 0) {
    container.innerHTML = '<div class="empty">該当なし</div>';
    return;
  }
  list.forEach(e => {
    const item = document.createElement('div');
    item.className = 'entry-item' + (e.id === state.selectedId ? ' selected' : '');
    const title = document.createElement('div');
    title.className = 'title';
    title.textContent = e.title;
    item.appendChild(title);
    item.onclick = () => {
      state.selectedId = e.id;
      state.editingSection = null;
      if (window.innerWidth <= 640) document.body.classList.add('list-hidden');
      render();
    };
    container.appendChild(item);
  });
}

function renderDetail() {
  const container = document.getElementById('pane-detail');
  container.innerHTML = '';
  const list = filterEntries();
  // 選択中エントリが現在のフィルタに含まれない場合は先頭を選ぶ
  let entry = state.data.entries.find(e => e.id === state.selectedId);
  if (!entry || !list.find(e => e.id === entry.id)) {
    entry = list[0];
    state.selectedId = entry ? entry.id : null;
    state.editingSection = null;
  }
  if (!entry) {
    container.innerHTML = '<div class="empty">左のリストからナレッジを選択してください<br><br>または「＋新規追加」から登録できます。</div>';
    return;
  }
  const card = document.createElement('div');
  card.className = 'detail-card';

  renderTitleSection(card, entry);
  renderChecklistSection(card, entry);
  renderCoursesSection(card, entry);
  renderNotesSection(card, entry);
  renderActionsRow(card, entry);

  container.appendChild(card);
}

function commitSectionEdit(entry, patch) {
  Object.assign(entry, patch);
  entry.updatedAt = new Date().toISOString();
  state.editingSection = null;
  saveData(state.data);
  render();
}

function makeIconBtn(label, onClick) {
  const b = document.createElement('button');
  b.className = 'icon-btn';
  b.type = 'button';
  b.textContent = label;
  b.onclick = onClick;
  return b;
}

// --- タイトル ---

    input.style.border = '1px solid var(--border)';

// --- チェックリスト ---
function renderChecklistSection(card, entry) {
  const sec = document.createElement('section');
  const h3 = document.createElement('h3');
  const titleSpan = document.createElement('span');
  titleSpan.textContent = '【チェックリスト】';
  h3.appendChild(titleSpan);
  const actions = document.createElement('div');
  actions.className = 'section-actions';

  if (isEditingSection(entry.id, 'checklist')) {
    h3.appendChild(actions);
    sec.appendChild(h3);
    const area = document.createElement('div');
    area.className = 'section-edit-area';
    const ul = document.createElement('ul');
    ul.className = 'checklist-edit-list';

    const addRow = (text = '', done = false) => {
      const li = document.createElement('li');
      if (done) li.dataset.done = 'true';
      const input = document.createElement('input');
      input.type = 'text';
      input.value = text;
      input.placeholder = 'チェック項目';
      const del = document.createElement('button');
      del.type = 'button';
      del.textContent = '×';
      del.onclick = () => li.remove();
      li.appendChild(input);
      li.appendChild(del);
      ul.appendChild(li);
      return input;
    };

    (entry.checklist || []).forEach(c => addRow(c.text, !!c.done));
    area.appendChild(ul);

    const btnRow = document.createElement('div');
    btnRow.style.display = 'flex';
    btnRow.style.gap = '6px';
    btnRow.style.flexWrap = 'wrap';

    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.textContent = '＋ 項目追加';
    addBtn.onclick = () => {
      const input = addRow('');
      input.focus();
    };
    btnRow.appendChild(addBtn);

    // 現在のUL状態からチェックリスト配列を組み立てる
    const collectItems = () => {
      const old = entry.checklist || [];
      return Array.from(ul.querySelectorAll('li'))
        .map(li => {
          const input = li.querySelector('input[type="text"]');
          if (!input) return null;
          const text = input.value.trim();
          if (!text) return null;
          const found = old.find(c => c.text === text);
          const bulkDone = li.dataset.done === 'true';
          return { text, done: found ? !!found.done : bulkDone };
        })
        .filter(Boolean);
    };

    const bulkBtn = document.createElement('button');
    bulkBtn.type = 'button';
    bulkBtn.textContent = '📋 Markdown一括貼り付け';
    bulkBtn.onclick = () => openBulkPasteModal(({ items, mode }) => {
      if (mode === 'replace') ul.innerHTML = '';
      items.forEach(it => addRow(it.text, it.done));
      // 取り込んだ瞬間に全体保存（保存押し忘れによる消失を防ぐ）
      commitSectionEdit(entry, { checklist: collectItems() });
    });
    btnRow.appendChild(bulkBtn);

    area.appendChild(btnRow);

    const acts = document.createElement('div');
    acts.className = 'section-edit-actions';
    const save = document.createElement('button');
    save.className = 'primary';
    save.textContent = '保存';
    save.onclick = () => {
      commitSectionEdit(entry, { checklist: collectItems() });
    };
    const cancel = document.createElement('button');
    cancel.textContent = 'キャンセル';
    cancel.onclick = cancelSectionEdit;
    acts.appendChild(cancel);
    acts.appendChild(save);
    area.appendChild(acts);
    sec.appendChild(area);
  } else {
    const resetBtn = makeIconBtn('リセット', () => {
      (entry.checklist || []).forEach(c => c.done = false);
      saveData(state.data);
      render();
    });
    const editBtn = makeIconBtn('✎ 編集', () => startSectionEdit(entry.id, 'checklist'));
    actions.appendChild(resetBtn);
    actions.appendChild(editBtn);
    h3.appendChild(actions);
    sec.appendChild(h3);

    if (entry.checklist && entry.checklist.length) {
      const total = entry.checklist.length;
      const done = entry.checklist.filter(c => c.done).length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      const allDone = done === total && total > 0;

      // 総合進捗
      const overall = document.createElement('div');
      overall.className = 'checklist-overall';
      const otext = document.createElement('div');
      otext.className = 'checklist-overall-text';
      otext.innerHTML = `<strong>${done} / ${total}</strong> 完了 (${pct}%)`;
      const obar = document.createElement('div');
      obar.className = 'checklist-overall-bar';
      const ofill = document.createElement('div');
      ofill.className = 'checklist-overall-fill' + (allDone ? ' complete' : '');
      ofill.style.width = pct + '%';
      obar.appendChild(ofill);
      overall.appendChild(otext);
      overall.appendChild(obar);
      sec.appendChild(overall);

      const groups = groupChecklistItems(entry.checklist);

      // 2グループ以上ある時のみ 全開/全閉 ボタン
      if (groups.length >= 2) {
        const gActions = document.createElement('div');
        gActions.className = 'checklist-global-actions';
        const expandAll = document.createElement('button');
        expandAll.textContent = '▼ 全開';
        expandAll.onclick = () => {
          groups.forEach(g => {
            state.collapsedSections.delete(`${entry.id}::checklist::${g.name}`);
          });
          render();
        };
        const collapseAll = document.createElement('button');
        collapseAll.textContent = '▶ 全閉';
        collapseAll.onclick = () => {
          groups.forEach(g => {
            state.collapsedSections.add(`${entry.id}::checklist::${g.name}`);
          });
          render();
        };
        gActions.appendChild(expandAll);
        gActions.appendChild(collapseAll);
        sec.appendChild(gActions);
      }

      groups.forEach(g => {
        const key = `${entry.id}::checklist::${g.name}`;
        const collapsed = state.collapsedSections.has(key);
        const gDone = g.items.filter(i => i.done).length;
        const gTotal = g.items.length;
        const gAllDone = gDone === gTotal && gTotal > 0;

        const groupDiv = document.createElement('div');
        groupDiv.className = 'checklist-group'
          + (collapsed ? ' collapsed' : '')
          + (gAllDone ? ' complete' : '');

        const header = document.createElement('div');
        header.className = 'checklist-group-header';
        const toggle = document.createElement('span');
        toggle.className = 'checklist-group-toggle';
        toggle.textContent = collapsed ? '▶' : '▼';
        const title = document.createElement('span');
        title.className = 'checklist-group-title';
        title.textContent = g.name;
        const badge = document.createElement('span');
        badge.className = 'checklist-group-badge';
        badge.textContent = `${gDone} / ${gTotal}`;
        header.appendChild(toggle);
        header.appendChild(title);
        header.appendChild(badge);
        header.onclick = () => {
          if (state.collapsedSections.has(key)) state.collapsedSections.delete(key);
          else state.collapsedSections.add(key);
          render();
        };
        groupDiv.appendChild(header);

        if (!collapsed) {
          const ul = document.createElement('ul');
          ul.className = 'checklist-group-items';
          g.items.forEach(item => {
            const li = document.createElement('li');
            if (item.done) li.classList.add('done');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = item.done;
            cb.id = `chk-${entry.id}-${item.index}`;
            cb.onchange = () => {
              entry.checklist[item.index].done = cb.checked;
              saveData(state.data);
              render();
            };
            const label = document.createElement('label');
            label.htmlFor = cb.id;
            label.textContent = item.text;
            li.appendChild(cb);
            li.appendChild(label);
            ul.appendChild(li);
          });
          groupDiv.appendChild(ul);
        }
        sec.appendChild(groupDiv);
      });
    } else {
      const empty = document.createElement('div');
      empty.style.color = 'var(--muted)';
      empty.style.fontSize = '13px';
      empty.textContent = '（項目なし）';
      sec.appendChild(empty);
    }
  }
  card.appendChild(sec);
}

// --- 競馬場別チェックリスト ---
function renderCoursesSection(card, entry) {
  ensureCourses(entry);
  const sec = document.createElement('section');
  const h3 = document.createElement('h3');
  h3.textContent = '【競馬場別チェックリスト】';
  sec.appendChild(h3);

  // タブ行
  const curIdx = getCourseIndex(entry);
  const tabs = document.createElement('div');
  tabs.className = 'course-tabs';
  entry.courses.forEach((course, idx) => {
    const total = course.checklist.length;
    const done = course.checklist.filter(c => c.done).length;
    const tab = document.createElement('button');
    tab.type = 'button';
    tab.className = 'course-tab' + (idx === curIdx ? ' active' : '');
    tab.textContent = total > 0 ? `${course.name} ${done}/${total}` : course.name;
    tab.onclick = () => {
      setCourseIndex(entry, idx);
      render();
    };
    tabs.appendChild(tab);
  });
  const addTab = document.createElement('button');
  addTab.type = 'button';
  addTab.className = 'course-tab-add';
  addTab.textContent = '＋ 競馬場';
  addTab.onclick = () => {
    const name = (prompt('競馬場名') || '').trim();
    if (!name) return;
    entry.courses.push({ name, checklist: [] });
    setCourseIndex(entry, entry.courses.length - 1);
    entry.updatedAt = new Date().toISOString();
    saveData(state.data);
    render();
  };
  tabs.appendChild(addTab);
  sec.appendChild(tabs);

  if (curIdx < 0) {
    const empty = document.createElement('div');
    empty.className = 'course-empty';
    empty.textContent = 'タブがまだありません。「＋ 競馬場」から追加してください。';
    sec.appendChild(empty);
    card.appendChild(sec);
    return;
  }

  const course = entry.courses[curIdx];
  const sectionKey = `course:${curIdx}`;

  if (isEditingSection(entry.id, sectionKey)) {
    // --- 編集モード ---
    const area = document.createElement('div');
    area.className = 'section-edit-area';

    // 名前編集
    const nameRow = document.createElement('div');
    nameRow.style.display = 'flex';
    nameRow.style.gap = '8px';
    nameRow.style.alignItems = 'center';
    nameRow.style.marginBottom = '10px';
    const nameLabel = document.createElement('span');
    nameLabel.style.fontSize = '12px';
    nameLabel.style.color = 'var(--muted)';
    nameLabel.style.minWidth = '80px';
    nameLabel.textContent = '競馬場名';
    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.value = course.name;
    nameInput.style.flex = '1';
    nameRow.appendChild(nameLabel);
    nameRow.appendChild(nameInput);
    area.appendChild(nameRow);

    // --- リンク編集 ---
    let editLinks = (course.links || []).map(l => ({
      label: l.label || '', url: l.url || ''
    }));
    const linksSection = document.createElement('div');
    linksSection.className = 'resource-edit-section';
    const linksTitle = document.createElement('div');
    linksTitle.className = 'title';
    linksTitle.textContent = '📎 関連リンク';
    linksSection.appendChild(linksTitle);
    const linksHolder = document.createElement('div');
    linksSection.appendChild(linksHolder);
    const linksActions = document.createElement('div');
    linksActions.className = 'row-actions';
    linksSection.appendChild(linksActions);
    const renderLinksEdit = () => {
      linksHolder.innerHTML = '';
      editLinks.forEach((l, i) => {
        const row = document.createElement('div');
        row.className = 'link-edit-row';
        const lbl = document.createElement('input');
        lbl.type = 'text';
        lbl.className = 'lbl';
        lbl.placeholder = 'ラベル（例：福島競馬場の特徴）';
        lbl.value = l.label;
        lbl.oninput = () => { editLinks[i].label = lbl.value; };
        const url = document.createElement('input');
        url.type = 'text';
        url.className = 'url';
        url.placeholder = 'https://...';
        url.value = l.url;
        url.oninput = () => { editLinks[i].url = url.value; };
        const del = document.createElement('button');
        del.type = 'button';
        del.textContent = '×';
        del.onclick = () => { editLinks.splice(i, 1); renderLinksEdit(); };
        row.appendChild(lbl);
        row.appendChild(url);
        row.appendChild(del);
        linksHolder.appendChild(row);
      });
    };
    const addLinkBtn = document.createElement('button');
    addLinkBtn.type = 'button';
    addLinkBtn.textContent = '＋ リンク追加';
    addLinkBtn.onclick = () => {
      editLinks.push({ label: '', url: '' });
      renderLinksEdit();
      const last = linksHolder.lastElementChild;
      if (last) last.querySelector('input.lbl').focus();
    };
    linksActions.appendChild(addLinkBtn);
    renderLinksEdit();
    area.appendChild(linksSection);

    // --- 画像編集 ---
    let editImages = (course.images || []).map(im => ({
      src: im.src || '', caption: im.caption || ''
    }));
    const imagesSection = document.createElement('div');
    imagesSection.className = 'resource-edit-section';
    const imagesTitle = document.createElement('div');
    imagesTitle.className = 'title';
    imagesTitle.textContent = '🖼️ 画像';
    imagesSection.appendChild(imagesTitle);
    const imagesHolder = document.createElement('div');
    imagesSection.appendChild(imagesHolder);
    const imagesActions = document.createElement('div');
    imagesActions.className = 'row-actions';
    imagesSection.appendChild(imagesActions);
    const renderImagesEdit = () => {
      imagesHolder.innerHTML = '';
      editImages.forEach((im, i) => {
        const row = document.createElement('div');
        row.className = 'image-edit-row';
        const thumb = document.createElement('img');
        thumb.src = im.src;
        thumb.alt = im.caption || '';
        thumb.onclick = () => openImageViewer(im.src);
        const cap = document.createElement('input');
        cap.type = 'text';
        cap.placeholder = 'キャプション（省略可）';
        cap.value = im.caption;
        cap.oninput = () => { editImages[i].caption = cap.value; };
        const del = document.createElement('button');
        del.type = 'button';
        del.textContent = '×';
        del.onclick = () => { editImages.splice(i, 1); renderImagesEdit(); };
        row.appendChild(thumb);
        row.appendChild(cap);
        row.appendChild(del);
        imagesHolder.appendChild(row);
      });
    };
    const uploadImgBtn = document.createElement('button');
    uploadImgBtn.type = 'button';
    uploadImgBtn.textContent = '📤 画像アップロード';
    uploadImgBtn.onclick = () => {
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = 'image/*';
      inp.multiple = true;
      inp.onchange = async () => {
        const files = Array.from(inp.files || []);
        for (const file of files) {
          try {
            const src = await readImageFileAsDataURL(file);
            editImages.push({ src, caption: '' });
          } catch (err) {
            alert(`画像読み込み失敗: ${file.name}`);
          }
        }
        renderImagesEdit();
      };
      inp.click();
    };
    const addImgUrlBtn = document.createElement('button');
    addImgUrlBtn.type = 'button';
    addImgUrlBtn.textContent = '🔗 URLで追加';
    addImgUrlBtn.onclick = () => {
      const u = (prompt('画像URL（https://...）') || '').trim();
      if (!u) return;
      editImages.push({ src: u, caption: '' });
      renderImagesEdit();
    };
    imagesActions.appendChild(uploadImgBtn);
    imagesActions.appendChild(addImgUrlBtn);
    renderImagesEdit();
    area.appendChild(imagesSection);

    const collectLinks = () => editLinks
      .map(l => ({ label: (l.label || '').trim(), url: (l.url || '').trim() }))
      .filter(l => l.url);
    const collectImages = () => editImages
      .map(im => ({ src: (im.src || '').trim(), caption: (im.caption || '').trim() }))
      .filter(im => im.src);

    // チェック項目リスト編集
    const ul = document.createElement('ul');
    ul.className = 'checklist-edit-list';
    const addRow = (text = '', done = false) => {
      const li = document.createElement('li');
      if (done) li.dataset.done = 'true';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.value = text;
      inp.placeholder = 'チェック項目';
      const del = document.createElement('button');
      del.type = 'button';
      del.textContent = '×';
      del.onclick = () => li.remove();
      li.appendChild(inp);
      li.appendChild(del);
      ul.appendChild(li);
      return inp;
    };
    (course.checklist || []).forEach(c => addRow(c.text, !!c.done));
    area.appendChild(ul);

    const collectItems = () => {
      const old = course.checklist || [];
      return Array.from(ul.querySelectorAll('li'))
        .map(li => {
          const inp = li.querySelector('input[type="text"]');
          if (!inp) return null;
          const t = inp.value.trim();
          if (!t) return null;
          const found = old.find(c => c.text === t);
          const bulkDone = li.dataset.done === 'true';
          return { text: t, done: found ? !!found.done : bulkDone };
        })
        .filter(Boolean);
    };

    const commitCourse = (updates) => {
      Object.assign(course, updates);
      entry.updatedAt = new Date().toISOString();
      state.editingSection = null;
      saveData(state.data);
      render();
    };

    // ボタン行
    const btnRow = document.createElement('div');
    btnRow.style.display = 'flex';
    btnRow.style.gap = '6px';
    btnRow.style.flexWrap = 'wrap';
    btnRow.style.marginTop = '8px';

    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.textContent = '＋ 項目追加';
    addBtn.onclick = () => addRow('').focus();
    btnRow.appendChild(addBtn);

    const bulkBtn = document.createElement('button');
    bulkBtn.type = 'button';
    bulkBtn.textContent = '📋 Markdown一括貼り付け';
    bulkBtn.onclick = () => openBulkPasteModal(({ items, mode }) => {
      if (mode === 'replace') ul.innerHTML = '';
      items.forEach(it => addRow(it.text, it.done));
      // 貼り付けた瞬間に全体保存
      commitCourse({
        name: nameInput.value.trim() || course.name,
        checklist: collectItems(),
        links: collectLinks(),
        images: collectImages()
      });
    });
    btnRow.appendChild(bulkBtn);
    area.appendChild(btnRow);

    // アクション行（保存／キャンセル／削除）
    const acts = document.createElement('div');
    acts.className = 'section-edit-actions';
    const delBtn = document.createElement('button');
    delBtn.textContent = '🗑️ このタブを削除';
    delBtn.style.marginRight = 'auto';
    delBtn.onclick = () => {
      if (!confirm(`タブ「${course.name}」を削除しますか？チェック項目もすべて消えます。`)) return;
      entry.courses.splice(curIdx, 1);
      setCourseIndex(entry, Math.max(0, curIdx - 1));
      entry.updatedAt = new Date().toISOString();
      state.editingSection = null;
      saveData(state.data);
      render();
    };
    const cancel = document.createElement('button');
    cancel.textContent = 'キャンセル';
    cancel.onclick = cancelSectionEdit;
    const save = document.createElement('button');
    save.className = 'primary';
    save.textContent = '保存';
    save.onclick = () => commitCourse({
      name: nameInput.value.trim() || course.name,
      checklist: collectItems(),
      links: collectLinks(),
      images: collectImages()
    });
    acts.appendChild(delBtn);
    acts.appendChild(cancel);
    acts.appendChild(save);
    area.appendChild(acts);
    sec.appendChild(area);
  } else {
    // --- 表示モード ---
    const headerRow = document.createElement('div');
    headerRow.style.display = 'flex';
    headerRow.style.justifyContent = 'flex-end';
    headerRow.style.gap = '6px';
    headerRow.style.marginBottom = '6px';
    const resetBtn = makeIconBtn('リセット', () => {
      course.checklist.forEach(c => c.done = false);
      saveData(state.data);
      render();
    });
    const editBtn = makeIconBtn('✎ 編集', () => startSectionEdit(entry.id, sectionKey));
    headerRow.appendChild(resetBtn);
    headerRow.appendChild(editBtn);
    sec.appendChild(headerRow);

    const total = course.checklist.length;
    const done = course.checklist.filter(c => c.done).length;
    // 関連リンク・画像（チェック項目の有無に関わらず表示）
    const hasLinks = Array.isArray(course.links) && course.links.length > 0;
    const hasImages = Array.isArray(course.images) && course.images.length > 0;
    if (hasLinks || hasImages) {
      const resources = document.createElement('div');
      resources.className = 'course-resources';
      if (hasLinks) {
        const block = document.createElement('div');
        block.className = 'course-resource-block';
        const t = document.createElement('div');
        t.className = 'title';
        t.textContent = '📎 関連リンク';
        block.appendChild(t);
        const list = document.createElement('div');
        list.className = 'course-link-list';
        course.links.forEach(l => {
          const a = document.createElement('a');
          a.className = 'course-link-chip';
          a.href = l.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          const icon = document.createElement('span');
          icon.textContent = '🔗';
          const lab = document.createElement('span');
          lab.className = 'label';
          lab.textContent = l.label || l.url;
          a.appendChild(icon);
          a.appendChild(lab);
          list.appendChild(a);
        });
        block.appendChild(list);
        resources.appendChild(block);
      }
      if (hasImages) {
        const block = document.createElement('div');
        block.className = 'course-resource-block';
        const t = document.createElement('div');
        t.className = 'title';
        t.textContent = '🖼️ 画像';
        block.appendChild(t);
        const list = document.createElement('div');
        list.className = 'course-image-list';
        course.images.forEach(im => {
          const wrap = document.createElement('div');
          wrap.className = 'course-image-thumb-wrap';
          const thumb = document.createElement('img');
          thumb.className = 'course-image-thumb';
          thumb.src = im.src;
          thumb.alt = im.caption || '';
          thumb.loading = 'lazy';
          thumb.onclick = () => openImageViewer(im.src);
          wrap.appendChild(thumb);
          if (im.caption) {
            const cap = document.createElement('div');
            cap.className = 'caption';
            cap.textContent = im.caption;
            cap.title = im.caption;
            wrap.appendChild(cap);
          }
          list.appendChild(wrap);
        });
        block.appendChild(list);
        resources.appendChild(block);
      }
      sec.appendChild(resources);
    }
    if (total > 0) {
      const pct = Math.round((done / total) * 100);
      const prog = document.createElement('div');
      prog.className = 'course-progress';
      prog.textContent = `${course.name} — ${done} / ${total} 完了 (${pct}%)`;
      sec.appendChild(prog);

      const groups = groupChecklistItems(course.checklist);
      const groupIdOf = (gi) => `course-group-${entry.id}-${curIdx}-${gi}`;
      const jumpToGroup = (gi) => {
        const key = `${entry.id}::course:${curIdx}::${groups[gi].name}`;
        state.collapsedSections.delete(key);
        const el = document.getElementById(groupIdOf(gi));
        const container = document.querySelector('.pane-detail');
        const doScroll = () => {
          const t = document.getElementById(groupIdOf(gi));
          if (!t) return;
          if (container) {
            const cr = container.getBoundingClientRect();
            const tr = t.getBoundingClientRect();
            container.scrollTo({
              top: tr.top - cr.top + container.scrollTop - 8,
              behavior: 'smooth'
            });
          } else {
            t.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
          t.classList.add('jump-target-hit');
          setTimeout(() => t.classList.remove('jump-target-hit'), 1300);
        };
        if (!el) {
          render();
          requestAnimationFrame(doScroll);
        } else {
          doScroll();
        }
      };

      // ジャンプチップバー（2グループ以上あるときのみ）
      if (groups.length >= 2) {
        const jumpBar = document.createElement('div');
        jumpBar.className = 'course-jump-bar';
        const lbl = document.createElement('span');
        lbl.className = 'label';
        lbl.textContent = '▼ 距離/コース';
        jumpBar.appendChild(lbl);
        groups.forEach((g, gi) => {
          const gDone = g.items.filter(i => i.done).length;
          const gTotal = g.items.length;
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'course-jump-chip'
            + (gDone === gTotal && gTotal > 0 ? ' complete' : '');
          chip.textContent = `${g.name} ${gDone}/${gTotal}`;
          chip.onclick = () => jumpToGroup(gi);
          jumpBar.appendChild(chip);
        });
        sec.appendChild(jumpBar);
      }

      groups.forEach((g, gi) => {
        const key = `${entry.id}::course:${curIdx}::${g.name}`;
        const collapsed = state.collapsedSections.has(key);
        const gDone = g.items.filter(i => i.done).length;
        const gTotal = g.items.length;
        const gAllDone = gDone === gTotal && gTotal > 0;

        const groupDiv = document.createElement('div');
        groupDiv.id = groupIdOf(gi);
        groupDiv.className = 'checklist-group'
          + (collapsed ? ' collapsed' : '')
          + (gAllDone ? ' complete' : '');

        const header = document.createElement('div');
        header.className = 'checklist-group-header';
        const toggle = document.createElement('span');
        toggle.className = 'checklist-group-toggle';
        toggle.textContent = collapsed ? '▶' : '▼';
        const title = document.createElement('span');
        title.className = 'checklist-group-title';
        title.textContent = g.name;
        const badge = document.createElement('span');
        badge.className = 'checklist-group-badge';
        badge.textContent = `${gDone} / ${gTotal}`;
        header.appendChild(toggle);
        header.appendChild(title);
        header.appendChild(badge);
        header.onclick = () => {
          if (state.collapsedSections.has(key)) state.collapsedSections.delete(key);
          else state.collapsedSections.add(key);
          render();
        };
        groupDiv.appendChild(header);

        if (!collapsed) {
          const ul = document.createElement('ul');
          ul.className = 'checklist-group-items';
          g.items.forEach(item => {
            const li = document.createElement('li');
            if (item.done) li.classList.add('done');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = item.done;
            cb.id = `course-chk-${entry.id}-${curIdx}-${item.index}`;
            cb.onchange = () => {
              course.checklist[item.index].done = cb.checked;
              saveData(state.data);
              render();
            };
            const label = document.createElement('label');
            label.htmlFor = cb.id;
            label.textContent = item.text;
            li.appendChild(cb);
            li.appendChild(label);
            ul.appendChild(li);
          });
          groupDiv.appendChild(ul);
        }
        sec.appendChild(groupDiv);
      });
    } else {
      const empty = document.createElement('div');
      empty.className = 'course-empty';
      empty.textContent = `「${course.name}」のチェック項目はまだありません。「✎ 編集」から追加してください。`;
      sec.appendChild(empty);
    }
  }

  card.appendChild(sec);
}

function saveEdit() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) {
    alert('タイトルは必須です');
    return;
  }
  const keywords = splitCsv(document.getElementById('f-keywords').value);
  const tags = splitCsv(document.getElementById('f-tags').value);
  const flow = document.getElementById('f-flow').value;
  const notes = document.getElementById('f-notes').value;
  const checklist = Array.from(document.querySelectorAll('#f-checklist-list input[type="text"]'))
    .map(i => i.value.trim())
    .filter(Boolean)
    .map(text => {
      // 既存項目のdoneを引き継ぐ
      if (state.editingId) {
        const old = state.data.entries.find(e => e.id === state.editingId);
        const found = old && old.checklist && old.checklist.find(c => c.text === text);
        if (found) return { text, done: !!found.done };
      }
      return { text, done: false };
    });

  if (state.editingId) {
    const e = state.data.entries.find(x => x.id === state.editingId);
    e.title = title; e.keywords = keywords; e.tags = tags;
    e.flow = flow; e.notes = notes; e.checklist = checklist;
    e.updatedAt = new Date().toISOString();
    state.selectedId = e.id;
  } else {
    const newEntry = {
      id: crypto.randomUUID(),
      title, keywords, tags, flow, notes, checklist,
      updatedAt: new Date().toISOString()
    };
    state.data.entries.push(newEntry);
    state.selectedId = newEntry.id;
  }
  saveData(state.data);
  closeEditModal();
  render();
}

  const a = document.createElement('a');
  const d = new Date();
  const yyyy = d.getFullYear();

function addTagManageRow(originalName) {
  const ul = document.getElementById('tag-manage-list');
  const li = document.createElement('li');
  li.dataset.original = originalName;

  const input = document.createElement('input');
  input.type = 'text';
  input.value = originalName;
  li.appendChild(input);

  const upBtn = document.createElement('button');
  upBtn.type = 'button';
  upBtn.title = '上へ';
  upBtn.textContent = '↑';
  upBtn.onclick = () => {
    const prev = li.previousElementSibling;
    if (prev) ul.insertBefore(li, prev);
  };
  li.appendChild(upBtn);

  const downBtn = document.createElement('button');
  downBtn.type = 'button';
  downBtn.title = '下へ';
  downBtn.textContent = '↓';
  downBtn.onclick = () => {
    const next = li.nextElementSibling;
    if (next) ul.insertBefore(next, li);
  };
  li.appendChild(downBtn);

  const delBtn = document.createElement('button');
  delBtn.type = 'button';
  delBtn.textContent = '削除';
  delBtn.onclick = () => {
    if (li.classList.contains('deleted')) {
      li.classList.remove('deleted');
      delBtn.textContent = '削除';
      input.disabled = false;
    } else {
      li.classList.add('deleted');
      delBtn.textContent = '取消';
      input.disabled = true;
    }
  };
  li.appendChild(delBtn);

  ul.appendChild(li);
}

function closeTagManageModal() {
  document.getElementById('tag-manage-modal').classList.remove('show');
}

function saveTagManage() {
  const lis = Array.from(document.querySelectorAll('#tag-manage-list li[data-original]'));
  const items = lis.map(li => ({
    original: li.dataset.original,
    current: li.querySelector('input[type="text"]').value.trim(),
    deleted: li.classList.contains('deleted')
  }));

  // 空名チェック
  for (const it of items) {
    if (!it.deleted && !it.current) {
      alert(`タグ名は空にできません（元: ${it.original}）`);
      return;
    }
  }

  const renameMap = new Map();
  const deleteSet = new Set();
  items.forEach(it => {
    if (it.deleted) {
      deleteSet.add(it.original);
    } else if (it.original !== it.current) {
      renameMap.set(it.original, it.current);
    }
  });

  const transform = t => {
    if (deleteSet.has(t)) return null;
    return renameMap.get(t) || t;
  };

  // 全エントリに適用
  state.data.entries.forEach(e => {
    if (!Array.isArray(e.tags)) return;
    const next = [];
    const seen = new Set();
    e.tags.forEach(t => {
      const v = transform(t);
      if (v && !seen.has(v)) { next.push(v); seen.add(v); }
    });
    e.tags = next;
  });

  // 新しいタグ順序
  const orderSet = new Set();
  const newOrder = [];
  items.forEach(it => {
    if (it.deleted) return;
    const name = it.current;
    if (!orderSet.has(name)) { orderSet.add(name); newOrder.push(name); }
  });
  state.data.tagOrder = newOrder;

  // アクティブタグも追従
  const activeNext = new Set();
  state.activeTags.forEach(t => {
    const v = transform(t);
    if (v) activeNext.add(v);
  });
  state.activeTags = activeNext;

  saveData(state.data);
  closeTagManageModal();
  render();
}

async function readImageFileAsDataURL(file, maxDim = 1400, quality = 0.85) {
  const raw = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onerror = () => reject(r.error || new Error('read failed'));
    r.onload = () => resolve(r.result);
    r.readAsDataURL(file);
  });
  try {
    const img = await new Promise((resolve, reject) => {
      const i = new Image();
      i.onerror = () => reject(new Error('decode failed'));
      i.onload = () => resolve(i);
      i.src = raw;
    });
    const long = Math.max(img.naturalWidth, img.naturalHeight);
    const scale = long > maxDim ? maxDim / long : 1;
    if (scale === 1 && raw.length < 400000) return raw;
    const w = Math.max(1, Math.round(img.naturalWidth * scale));
    const h = Math.max(1, Math.round(img.naturalHeight * scale));
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', quality);
  } catch {
    return raw;
  }
}

  const items = parseMarkdownChecklist(text, { withSection });
  if (items.length === 0) {
    alert('「- [ ]」形式のチェック項目が見つかりませんでした');
    return;
  }
  if (bulkPasteOnApply) bulkPasteOnApply({ items, mode });
  closeBulkPasteModal();
}

let pendingImportData = null;

function startImport() {
  document.getElementById('file-input').click();
}

function onFilePicked(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed || !Array.isArray(parsed.entries)) {
        alert('不正なJSONファイルです');
        return;
      }
      pendingImportData = parsed;
      document.getElementById('import-summary').textContent =
        `読み込んだエントリ数：${parsed.entries.length} 件 / 現在のエントリ数：${state.data.entries.length} 件`;
      document.getElementById('import-modal').classList.add('show');
    } catch {
      alert('JSONとして読み込めませんでした');
    } finally {
      ev.target.value = '';
    }
  };
  reader.readAsText(file);
}

function applyImport(mode) {
  if (!pendingImportData) return;
  const incomingOrder = Array.isArray(pendingImportData.tagOrder) ? pendingImportData.tagOrder : [];
  if (mode === 'overwrite') {
    state.data = {
      version: DATA_VERSION,
      entries: pendingImportData.entries.map(normalizeImportedEntry),
      tagOrder: incomingOrder
    };
  } else {
    // merge: id重複は updatedAt が新しい方
    const map = new Map(state.data.entries.map(e => [e.id, e]));
    pendingImportData.entries.map(normalizeImportedEntry).forEach(incoming => {
      const cur = map.get(incoming.id);
      if (!cur) { map.set(incoming.id, incoming); return; }
      const a = Date.parse(cur.updatedAt || 0) || 0;
      const b = Date.parse(incoming.updatedAt || 0) || 0;
      if (b > a) map.set(incoming.id, incoming);
    });
    const currentOrder = Array.isArray(state.data.tagOrder) ? state.data.tagOrder : [];
    const mergedOrder = [...currentOrder];
    incomingOrder.forEach(t => { if (!mergedOrder.includes(t)) mergedOrder.push(t); });
    state.data = { version: DATA_VERSION, entries: Array.from(map.values()), tagOrder: mergedOrder };
  }
  saveData(state.data);
  pendingImportData = null;
  document.getElementById('import-modal').classList.remove('show');
  state.selectedId = null;
  render();
}

function normalizeImportedEntry(e) {
  return {
    id: e.id || crypto.randomUUID(),
    title: e.title || '(無題)',
    keywords: Array.isArray(e.keywords) ? e.keywords : [],
    tags: Array.isArray(e.tags) ? e.tags : [],
    flow: e.flow || '',
    notes: e.notes || '',
    checklist: Array.isArray(e.checklist)
      ? e.checklist.map(c => ({ text: c.text || '', done: !!c.done }))
      : [],
    updatedAt: e.updatedAt || new Date().toISOString()
  };
}

// ===== イベント配線 =====
document.getElementById('search-input').addEventListener('input', e => {
  state.searchTerm = e.target.value;
  render();
});
document.getElementById('btn-clear-search').onclick = () => {
  document.getElementById('search-input').value = '';
  state.searchTerm = '';
  state.activeTags.clear();
  render();
};
document.getElementById('btn-new').onclick = () => openEditModal(null);
document.getElementById('btn-cancel-edit').onclick = closeEditModal;
document.getElementById('btn-save-edit').onclick = saveEdit;
document.getElementById('btn-add-check').onclick = () => addChecklistRow('');
document.getElementById('btn-export').onclick = exportJson;
document.getElementById('btn-import').onclick = startImport;
document.getElementById('file-input').addEventListener('change', onFilePicked);
document.getElementById('btn-cancel-import').onclick = () => {
  pendingImportData = null;
  document.getElementById('import-modal').classList.remove('show');
};
document.getElementById('btn-import-overwrite').onclick = () => applyImport('overwrite');
document.getElementById('btn-import-merge').onclick = () => applyImport('merge');
document.getElementById('btn-cancel-bp').onclick = closeBulkPasteModal;
document.getElementById('btn-apply-bp').onclick = applyBulkPaste;
document.getElementById('btn-cancel-tag-manage').onclick = closeTagManageModal;
document.getElementById('btn-save-tag-manage').onclick = saveTagManage;
document.getElementById('btn-toggle-list').onclick = () => {
  document.body.classList.toggle('list-hidden');
};
document.getElementById('iv-close').onclick = closeImageViewer;
document.getElementById('image-viewer').addEventListener('click', (e) => {
  if (e.target.id === 'image-viewer') closeImageViewer();
});

// モバイルでは初期状態で左ペインを畳む
if (window.innerWidth <= 640) {
  document.body.classList.add('list-hidden');
}

// ESCでモーダル／インライン編集を閉じる
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeEditModal();
    document.getElementById('import-modal').classList.remove('show');
    closeBulkPasteModal();
    closeTagManageModal();
    closeImageViewer();
    if (state.editingSection) {
      state.editingSection = null;
      render();
    }
  }
});

// 初期描画
render();
</script>
